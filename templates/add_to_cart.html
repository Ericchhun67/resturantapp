{% extends "styles.html" %}

{% block content %}
    <h1 style="background-color: black;">Add to Cart</h1>
    <a href="{{ url_for('menu') }}">Back to Menu</a>
    <!-- add to cart page with a form to add items to the cart and a submit button to submit the form
        the form should have a dropdown to select the item, a input to select the quantity, and a submit button to submit the form -->
        <form method="POST" action="{{ url_for('add_to_cart') }}">
            <label for="item">Item:</label>
            <select id="item" name="item">
                <option value="spaghetti_pomodoro">Spaghetti Pomodoro</option>
                <option value="fettuccine_alfredo">Fettuccine Alfredo</option>
                <option value="caprese_salad">Caprese Salad</option>
            </select>
            <label for="quantity">Quantity:</label>
            <input type="number" id="quantity" name="quantity" min="1" value="1">
            <button type="submit">Purchase-item</button>
        </form>
    <style>
        form {
            display: flex;
            flex-direction: column;
            max-width: 300px;
            margin: 20px auto;
            background-color: black;
            padding: 20px;
            border-radius: 8px;
        }
        label {
            margin-bottom: 8px;
            color: white;
        }
        select, input {
            margin-bottom: 16px;
            padding: 8px;  
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        button {
            padding: 10px 20px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        button:hover {
            background-color: #0056b3;
        }
    </style>    
{% endblock %}
